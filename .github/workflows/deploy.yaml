name: Publish Documentation to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install System Dependencies & Plugins
        run: |
          pip install mkdocs>=1.5.0 mkdocs-material>=9.0.0 mkdocs-minify-plugin>=0.8.0
      - name: Execute Deploy Command
        run: mkdocs gh-deploy --force
